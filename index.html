<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Экспедиция 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #1c1c1c;
            --tg-theme-button-color: #0088cc;
            --tg-theme-button-text-color: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { padding: 20px; }
        .btn {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 18px 36px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .status { margin-top: 25px; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛰 Гео-фиксация</h1>
        <p>Нажмите кнопку, чтобы отправить свои координаты в журнал экспедиции.</p>
        <button class="btn" id="sendBtn">ОТПРАВИТЬ GPS</button>
        <div class="status" id="status">Ожидание нажатия...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ВНИМАНИЕ: Замени этот URL на свой адрес Webhook из n8n (Шаг 1)
        const WEBHOOK_URL = 'https://kreha.ru/webhook/expedition-location';

        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        btn.onclick = () => {
            btn.disabled = true;
            status.innerText = "Определяю местоположение...";
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const data = {
                    user_id: tg.initDataUnsafe.user?.id || 0,
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude
                };

                status.innerText = "Передаю данные в n8n...";

                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                })
                .then(() => {
                    status.innerText = "Успешно сохранено! Закрываю окно...";
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1500);
                })
                .catch((err) => {
                    status.innerText = "Ошибка сети: " + err.message;
                    btn.disabled = false;
                });
            }, (err) => {
                status.innerText = "Ошибка GPS: " + err.message;
                btn.disabled = false;
            }, { enableHighAccuracy: true });
        };
    </script>
</body>
</html>
